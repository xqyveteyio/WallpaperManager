<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>源管理</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
      background: #fff;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #toolbar h1 {
      font-size: 14px;
      font-weight: 600;
    }

    button {
      padding: 5px 14px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background: #e8e8e8;
    }

    button.active-indicator {
      border-color: #4caf50;
      color: #2e7d32;
      background: #f1f8f1;
      cursor: default;
    }

    button.danger:hover {
      background: #fdecea;
    }

    #source-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .source-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }

    .source-item:last-child {
      border-bottom: none;
    }

    .source-info {
      flex: 1;
      overflow: hidden;
    }

    .source-name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-meta {
      color: #888;
      font-size: 11px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .source-count {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
    }

    button.danger {
      border-color: #e57373;
      color: #c62828;
      background: #fff;
    }
      text-align: center;
      color: #aaa;
      padding: 40px 0;
    }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #modal-overlay.visible {
      display: flex;
    }

    #modal {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 20px;
      width: 340px;
    }

    #modal h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    #modal input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
    }

    #modal input:focus {
      border-color: #888;
    }

    #modal-tip {
      font-size: 11px;
      color: #e53935;
      margin-top: 6px;
      min-height: 16px;
    }

    #modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    #modal-confirm {
      background: #222;
      color: #fff;
      border-color: #222;
    }

    #modal-confirm:hover {
      background: #444;
    }

    #modal-confirm:disabled {
      background: #aaa;
      border-color: #aaa;
      cursor: default;
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <h1>壁纸源管理</h1>
    <button id="btn-add">+ 添加源</button>
  </div>

  <div id="source-list">
    <div id="empty-tip">暂无壁纸源，点击「添加源」导入</div>
  </div>

  <div id="modal-overlay">
    <div id="modal">
      <h2>添加壁纸源</h2>
      <input id="url-input" type="text" placeholder="输入源 URL..." />
      <div id="modal-tip"></div>
      <div id="modal-actions">
        <button id="modal-cancel">取消</button>
        <button id="modal-confirm">获取并添加</button>
      </div>
    </div>
  </div>

  <script src="/js/neutralino.js"></script>
  <script src="/js/source-manager.js"></script>
</body>

</html>
